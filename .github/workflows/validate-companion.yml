name: Validate companion

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install SQLite
        run: sudo apt-get update && sudo apt-get install --yes sqlite3
      - name: Validate reader guidance and teaching fixtures
        run: ./scripts/validate_companion.sh
