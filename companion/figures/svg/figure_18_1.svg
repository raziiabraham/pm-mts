<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2300" viewBox="0 0 1600 2300" role="img" aria-labelledby="title desc">
<title id="title">F18.1: The Prototype Fidelity Ladder</title>
<desc id="desc">Increase fidelity only when the learning question demands a more expensive proof. The stages are: Learning question; Sketch or flow; Clickable interface; Data-backed simulation; Coded integration; Production slice.</desc>
