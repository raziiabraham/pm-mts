<title id="title">F3.1: The Delivery Confidence Path</title>
<desc id="desc">Integration, deployment, exposure, and learning are separate product decisions. The stages are: Small change on a branch; Build and automated checks; Pull request and review; Preview or staging verification; Merge and deploy; Flagged or staged exposure; Production monitoring; Healthy? Continue, pause, or roll back.</desc>
