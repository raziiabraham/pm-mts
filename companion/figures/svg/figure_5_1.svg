<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2300" viewBox="0 0 1600 2300" role="img" aria-labelledby="title desc">
<title id="title">F5.1: How Join Grain Expands</title>
<desc id="desc">Customer, rental, payment, inventory, and film relationships show how a correct join can multiply rows and change the unit of analysis.</desc>
<rect data-figure-background="true" width="100%" height="100%" fill="#FFFFFF" />
<rect width="1600" height="2300" fill="#FAFAFA"/>
<text x="150" y="125" fill="#242424" font-family="Newsreader, sans-serif" font-size="48" font-weight="620" text-anchor="start" dy="0">HOW JOIN GRAIN EXPANDS</text>
<text x="154" y="225" fill="#6D6D6D" font-family="Manrope, sans-serif" font-size="27" font-weight="520" text-anchor="start" dy="0">A correct join can still answer the wrong question when one business object becomes many rows.</text>
<rect x="150" y="345" width="190" height="14" rx="7" fill="#404040" stroke="none" stroke-width="1"/>
<polygon points="90,480 1510,445 1490,965 110,995" fill="#E2E2E2" stroke="none"/>
<polygon points="105,1030 1490,1000 1510,1840 85,1810" fill="#D6D6D6" stroke="none"/>
<rect x="130" y="560" width="560" height="340" rx="26" fill="#FFFFFF" stroke="#242424" stroke-width="4"/>
<rect x="130" y="560" width="560" height="78" rx="24" fill="#E2E2E2" stroke="none" stroke-width="1"/>
<text x="160" y="602" fill="#242424" font-family="Manrope, sans-serif" font-size="27" font-weight="850" text-anchor="start" dy="0.34em">CUSTOMER · 1</text>
<text x="160" y="672" fill="#242424" font-family="Manrope, sans-serif" font-size="27" font-weight="650" text-anchor="start" dy="0">One row per customer</text>
<text x="160" y="858" fill="#6D6D6D" font-family="Manrope, sans-serif" font-size="19" font-weight="760" text-anchor="start" dy="0.34em">PK customer_id</text>
<rect x="910" y="560" width="560" height="340" rx="26" fill="#FFFFFF" stroke="#242424" stroke-width="4"/>
<rect x="910" y="560" width="560" height="78" rx="24" fill="#ECECEC" stroke="none" stroke-width="1"/>
<text x="940" y="602" fill="#242424" font-family="Manrope, sans-serif" font-size="27" font-weight="850" text-anchor="start" dy="0.34em">RENTAL · MANY</text>
<text x="940" y="672" fill="#242424" font-family="Manrope, sans-serif" font-size="27" font-weight="650" text-anchor="start" dy="0">One customer can create many rental</text>
<text x="940" y="703" fill="#242424" font-family="Manrope, sans-serif" font-size="27" font-weight="650" text-anchor="start" dy="0">rows</text>
<text x="940" y="858" fill="#6D6D6D" font-family="Manrope, sans-serif" font-size="19" font-weight="760" text-anchor="start" dy="0.34em">PK rental_id · FK customer_id</text>
<rect x="130" y="1140" width="560" height="360" rx="26" fill="#FFFFFF" stroke="#242424" stroke-width="4"/>
<rect x="130" y="1140" width="560" height="78" rx="24" fill="#ECECEC" stroke="none" stroke-width="1"/>
<text x="160" y="1182" fill="#242424" font-family="Manrope, sans-serif" font-size="27" font-weight="850" text-anchor="start" dy="0.34em">PAYMENT · MANY</text>
<text x="160" y="1252" fill="#242424" font-family="Manrope, sans-serif" font-size="27" font-weight="650" text-anchor="start" dy="0">One rental may carry several payment</text>
<text x="160" y="1283" fill="#242424" font-family="Manrope, sans-serif" font-size="27" font-weight="650" text-anchor="start" dy="0">records</text>
<text x="160" y="1458" fill="#6D6D6D" font-family="Manrope, sans-serif" font-size="19" font-weight="760" text-anchor="start" dy="0.34em">FK rental_id · amount</text>
<rect x="910" y="1110" width="560" height="340" rx="26" fill="#FFFFFF" stroke="#242424" stroke-width="4"/>
<rect x="910" y="1110" width="560" height="78" rx="24" fill="#E2E2E2" stroke="none" stroke-width="1"/>
<text x="940" y="1152" fill="#242424" font-family="Manrope, sans-serif" font-size="27" font-weight="850" text-anchor="start" dy="0.34em">INVENTORY</text>
<text x="940" y="1222" fill="#242424" font-family="Manrope, sans-serif" font-size="27" font-weight="650" text-anchor="start" dy="0">The rentable copy connects the</text>
<text x="940" y="1253" fill="#242424" font-family="Manrope, sans-serif" font-size="27" font-weight="650" text-anchor="start" dy="0">transaction to a title</text>
<text x="940" y="1408" fill="#6D6D6D" font-family="Manrope, sans-serif" font-size="19" font-weight="760" text-anchor="start" dy="0.34em">FK inventory_id · film_id</text>
<rect x="910" y="1590" width="560" height="320" rx="26" fill="#FFFFFF" stroke="#242424" stroke-width="4"/>
<rect x="910" y="1590" width="560" height="78" rx="24" fill="#D6D6D6" stroke="none" stroke-width="1"/>
<text x="940" y="1632" fill="#242424" font-family="Manrope, sans-serif" font-size="27" font-weight="850" text-anchor="start" dy="0.34em">FILM</text>
<text x="940" y="1702" fill="#242424" font-family="Manrope, sans-serif" font-size="27" font-weight="650" text-anchor="start" dy="0">Descriptive attributes belong to the title</text>
<text x="940" y="1868" fill="#6D6D6D" font-family="Manrope, sans-serif" font-size="19" font-weight="760" text-anchor="start" dy="0.34em">PK film_id · title</text>
<polyline points="690.0,730.0 900.0,730.0" fill="none" stroke="#404040" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
<polygon points="900,730 876,740 876,720" fill="#404040" stroke="none"/>
<rect x="720" y="629" width="160" height="62" rx="22" fill="#FAFAFA" stroke="#AAAAAA" stroke-width="2"/>
<text x="800" y="660" fill="#6D6D6D" font-family="Manrope, sans-serif" font-size="18" font-weight="820" text-anchor="middle" dy="0.34em">1 → MANY</text>
<polyline points="1100.0,900.0 1100.0,1000.0 410.0,1000.0 410.0,1130.0" fill="none" stroke="#404040" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
<polygon points="410,1130 400,1106 420,1106" fill="#404040" stroke="none"/>
<rect x="620" y="969" width="240" height="62" rx="22" fill="#FAFAFA" stroke="#AAAAAA" stroke-width="2"/>
<text x="740" y="1000" fill="#6D6D6D" font-family="Manrope, sans-serif" font-size="18" font-weight="820" text-anchor="middle" dy="0.34em">MAY MULTIPLY AGAIN</text>
<polyline points="1190.0,900.0 1190.0,1100.0" fill="none" stroke="#404040" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
<polygon points="1190,1100 1180,1076 1200,1076" fill="#404040" stroke="none"/>
<polyline points="1190.0,1450.0 1190.0,1580.0" fill="none" stroke="#404040" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
<polygon points="1190,1580 1180,1556 1200,1556" fill="#404040" stroke="none"/>
<rect x="135" y="1965" width="1330" height="120" rx="28" fill="#242424" stroke="none" stroke-width="1"/>
<text x="800" y="2025" fill="#FAFAFA" font-family="Manrope, sans-serif" font-size="25" font-weight="850" text-anchor="middle" dy="0.34em">NAME THE OUTPUT GRAIN BEFORE WRITING THE JOIN</text>
<text x="145" y="2130" fill="#242424" font-family="Newsreader, sans-serif" font-size="25" font-weight="500" text-anchor="start" dy="0">Keys connect tables; the product question decides which row is the unit of analysis.</text>
<text x="1450" y="2185" fill="#6D6D6D" font-family="Manrope, sans-serif" font-size="22" font-weight="820" text-anchor="end" dy="0">F5.1</text>
</svg>
