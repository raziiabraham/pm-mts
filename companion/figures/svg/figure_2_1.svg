<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2300" viewBox="0 0 1600 2300" role="img" aria-labelledby="title desc">
<title id="title">F2.1: The Registration Promise</title>
<desc id="desc">A registration request crosses user, product, identity, provider, storage, and recovery boundaries before the product can show a registered state.</desc>
<rect data-figure-background="true" width="100%" height="100%" fill="#FFFFFF" />
<rect width="1600" height="2300" fill="#FAFAFA"/>
<text x="150" y="125" fill="#242424" font-family="Newsreader, sans-serif" font-size="48" font-weight="620" text-anchor="start" dy="0">THE REGISTRATION PROMISE</text>
<text x="154" y="225" fill="#6D6D6D" font-family="Manrope, sans-serif" font-size="27" font-weight="520" text-anchor="start" dy="0">One user action crosses product, identity, provider, storage, and recovery boundaries.</text>
<rect x="150" y="345" width="190" height="14" rx="7" fill="#404040" stroke="none" stroke-width="1"/>
<polygon points="95,470 1510,445 1485,820 120,850" fill="#E2E2E2" stroke="none"/>
<polygon points="110,875 1490,850 1510,1620 80,1590" fill="#D6D6D6" stroke="none"/>
<polygon points="90,1650 1500,1625 1475,2070 115,2100" fill="#ECECEC" stroke="none"/>
<polyline points="700.0,650.0 866.0,650.0" fill="none" stroke="#404040" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
<polygon points="866,650 842,660 842,640" fill="#404040" stroke="none"/>
<polyline points="1160.0,737.5 1160.0,928.5" fill="none" stroke="#404040" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
<polygon points="1160,928 1150,904 1170,904" fill="#404040" stroke="none"/>
<polyline points="880.0,1030.0 714.0,1030.0" fill="none" stroke="#404040" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
<polygon points="714,1030 738,1020 738,1040" fill="#404040" stroke="none"/>
<polyline points="420.0,1117.5 420.0,1308.5" fill="none" stroke="#404040" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
<polygon points="420,1308 410,1284 430,1284" fill="#404040" stroke="none"/>
<polyline points="700.0,1410.0 866.0,1410.0" fill="none" stroke="#404040" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
<polygon points="866,1410 842,1420 842,1400" fill="#404040" stroke="none"/>
<polyline points="1160.0,1497.5 1160.0,1738.5" fill="none" stroke="#404040" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
<polygon points="1160,1738 1150,1714 1170,1714" fill="#404040" stroke="none"/>
<rect x="140" y="563" width="560" height="175" rx="22" fill="#FFFFFF" stroke="#242424" stroke-width="4"/>
<rect x="140" y="563" width="68" height="175" rx="20" fill="#E2E2E2" stroke="none" stroke-width="1"/>
<text x="174" y="650" fill="#242424" font-family="Manrope, sans-serif" font-size="30" font-weight="800" text-anchor="middle" dy="0.34em">01</text>
<text x="232" y="602" fill="#242424" font-family="Manrope, sans-serif" font-size="31" font-weight="720" text-anchor="start" dy="0">Enter phone number</text>
<rect x="880" y="563" width="560" height="175" rx="22" fill="#FFFFFF" stroke="#242424" stroke-width="4"/>
<rect x="880" y="563" width="68" height="175" rx="20" fill="#E2E2E2" stroke="none" stroke-width="1"/>
<text x="914" y="650" fill="#242424" font-family="Manrope, sans-serif" font-size="30" font-weight="800" text-anchor="middle" dy="0.34em">02</text>
<text x="972" y="602" fill="#242424" font-family="Manrope, sans-serif" font-size="31" font-weight="720" text-anchor="start" dy="0">Authorise an OTP request</text>
<rect x="880" y="943" width="560" height="175" rx="22" fill="#FFFFFF" stroke="#242424" stroke-width="4"/>
<rect x="880" y="943" width="68" height="175" rx="20" fill="#E2E2E2" stroke="none" stroke-width="1"/>
<text x="914" y="1030" fill="#242424" font-family="Manrope, sans-serif" font-size="30" font-weight="800" text-anchor="middle" dy="0.34em">03</text>
<text x="972" y="982" fill="#242424" font-family="Manrope, sans-serif" font-size="31" font-weight="720" text-anchor="start" dy="0">Provider delivers the code</text>
<rect x="140" y="943" width="560" height="175" rx="22" fill="#FFFFFF" stroke="#242424" stroke-width="4"/>
<rect x="140" y="943" width="68" height="175" rx="20" fill="#E2E2E2" stroke="none" stroke-width="1"/>
<text x="174" y="1030" fill="#242424" font-family="Manrope, sans-serif" font-size="30" font-weight="800" text-anchor="middle" dy="0.34em">04</text>
<text x="232" y="982" fill="#242424" font-family="Manrope, sans-serif" font-size="31" font-weight="720" text-anchor="start" dy="0">User submits the code</text>
<rect x="140" y="1323" width="560" height="175" rx="22" fill="#FFFFFF" stroke="#242424" stroke-width="4"/>
<rect x="140" y="1323" width="68" height="175" rx="20" fill="#E2E2E2" stroke="none" stroke-width="1"/>
<text x="174" y="1410" fill="#242424" font-family="Manrope, sans-serif" font-size="30" font-weight="800" text-anchor="middle" dy="0.34em">05</text>
<text x="232" y="1362" fill="#242424" font-family="Manrope, sans-serif" font-size="31" font-weight="720" text-anchor="start" dy="0">Verify code, expiry, and rate limit</text>
<rect x="880" y="1323" width="560" height="175" rx="22" fill="#FFFFFF" stroke="#242424" stroke-width="4"/>
<rect x="880" y="1323" width="68" height="175" rx="20" fill="#E2E2E2" stroke="none" stroke-width="1"/>
<text x="914" y="1410" fill="#242424" font-family="Manrope, sans-serif" font-size="30" font-weight="800" text-anchor="middle" dy="0.34em">06</text>
<text x="972" y="1362" fill="#242424" font-family="Manrope, sans-serif" font-size="31" font-weight="720" text-anchor="start" dy="0">Create account and session</text>
<rect x="880" y="1753" width="560" height="175" rx="22" fill="#FFFFFF" stroke="#242424" stroke-width="4"/>
<rect x="880" y="1753" width="68" height="175" rx="20" fill="#E2E2E2" stroke="none" stroke-width="1"/>
<text x="914" y="1840" fill="#242424" font-family="Manrope, sans-serif" font-size="30" font-weight="800" text-anchor="middle" dy="0.34em">07</text>
<text x="972" y="1792" fill="#242424" font-family="Manrope, sans-serif" font-size="31" font-weight="720" text-anchor="start" dy="0">Show the registered state</text>
<rect x="145" y="1725" width="555" height="285" rx="26" fill="#ECECEC" stroke="#242424" stroke-width="4"/>
<text x="179" y="1779" fill="#242424" font-family="Manrope, sans-serif" font-size="25" font-weight="850" text-anchor="start" dy="0">RECOVERY IS PRODUCT BEHAVIOR</text>
<text x="179" y="1830" fill="#242424" font-family="Manrope, sans-serif" font-size="27" font-weight="620" text-anchor="start" dy="0">Return a structured error and explain</text>
<text x="179" y="1860" fill="#242424" font-family="Manrope, sans-serif" font-size="27" font-weight="620" text-anchor="start" dy="0">whether to retry, wait, or use another</text>
<text x="179" y="1890" fill="#242424" font-family="Manrope, sans-serif" font-size="27" font-weight="620" text-anchor="start" dy="0">path.</text>
<polyline points="420.0,1498.0 420.0,1665.0 420.0,1718.0" fill="none" stroke="#404040" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
<polygon points="420,1718 410,1694 430,1694" fill="#404040" stroke="none"/>
<rect x="708" y="1379" width="164" height="62" rx="22" fill="#FAFAFA" stroke="#AAAAAA" stroke-width="2"/>
<text x="790" y="1410" fill="#6D6D6D" font-family="Manrope, sans-serif" font-size="18" font-weight="820" text-anchor="middle" dy="0.34em">VALID + UNUSED</text>
<rect x="310" y="1609" width="220" height="62" rx="22" fill="#FAFAFA" stroke="#AAAAAA" stroke-width="2"/>
<text x="420" y="1640" fill="#6D6D6D" font-family="Manrope, sans-serif" font-size="18" font-weight="820" text-anchor="middle" dy="0.34em">INVALID / EXPIRED</text>
<text x="145" y="2125" fill="#242424" font-family="Newsreader, sans-serif" font-size="25" font-weight="500" text-anchor="start" dy="0">Success and recovery are two outcomes of the same registration promise.</text>
<text x="1450" y="2185" fill="#6D6D6D" font-family="Manrope, sans-serif" font-size="22" font-weight="820" text-anchor="end" dy="0">F2.1</text>
</svg>
