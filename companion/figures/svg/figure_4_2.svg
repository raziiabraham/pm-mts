<text x="905" y="565" fill="#6D6D6D" font-family="Manrope, sans-serif" font-size="18" font-weight="820" text-anchor="middle" dy="0.34em">VALIDATION FAILS</text>
<polyline points="800.0,965.0 1014.0,965.0" fill="none" stroke="#404040" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
<polygon points="1014,965 990,975 990,955" fill="#404040" stroke="none"/>
<rect x="818" y="879" width="174" height="62" rx="22" fill="#FAFAFA" stroke="#AAAAAA" stroke-width="2"/>
<text x="905" y="910" fill="#6D6D6D" font-family="Manrope, sans-serif" font-size="18" font-weight="820" text-anchor="middle" dy="0.34em">TRANSFER FAILS</text>
<polyline points="800.0,1310.0 915.0,1310.0 915.0,1110.0 1014.0,1110.0" fill="none" stroke="#404040" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
<polygon points="1014,1110 990,1120 990,1100" fill="#404040" stroke="none"/>
<rect x="813" y="1184" width="204" height="62" rx="22" fill="#FAFAFA" stroke="#AAAAAA" stroke-width="2"/>
<text x="915" y="1215" fill="#6D6D6D" font-family="Manrope, sans-serif" font-size="18" font-weight="820" text-anchor="middle" dy="0.34em">PROCESSING FAILS</text>
<polyline points="800.0,1620.0 925.0,1620.0 1014.0,1480.0" fill="none" stroke="#404040" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
<polygon points="1014,1480 1010,1506 993,1495" fill="#404040" stroke="none"/>
<rect x="838" y="1544" width="154" height="62" rx="22" fill="#FAFAFA" stroke="#AAAAAA" stroke-width="2"/>
<text x="915" y="1575" fill="#6D6D6D" font-family="Manrope, sans-serif" font-size="18" font-weight="820" text-anchor="middle" dy="0.34em">NEW VARIANT</text>
<polyline points="1030.0,1480.0 900.0,1480.0 900.0,1350.0 814.0,1350.0" fill="none" stroke="#404040" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
