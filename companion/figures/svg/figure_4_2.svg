<text x="900" y="1415" fill="#6D6D6D" font-family="Manrope, sans-serif" font-size="18" font-weight="820" text-anchor="middle" dy="0.34em">NEW JOB</text>
<polyline points="800.0,1690.0 930.0,1690.0 1014.0,1840.0" fill="none" stroke="#404040" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
<polygon points="1014,1840 994,1824 1011,1814" fill="#404040" stroke="none"/>
<rect x="858" y="1719" width="114" height="62" rx="22" fill="#FAFAFA" stroke="#AAAAAA" stroke-width="2"/>
<text x="915" y="1750" fill="#6D6D6D" font-family="Manrope, sans-serif" font-size="18" font-weight="820" text-anchor="middle" dy="0.34em">REMOVE</text>
<rect x="1085" y="414" width="330" height="62" rx="22" fill="#FAFAFA" stroke="#AAAAAA" stroke-width="2"/>
<text x="1250" y="445" fill="#6D6D6D" font-family="Manrope, sans-serif" font-size="18" font-weight="820" text-anchor="middle" dy="0.34em">EXCEPTIONS + FOLLOW-UP</text>
<text x="145" y="2125" fill="#242424" font-family="Newsreader, sans-serif" font-size="25" font-weight="500" text-anchor="start" dy="0">Every terminal-looking state still needs ownership and a user-visible next action.</text>
<text x="1450" y="2185" fill="#6D6D6D" font-family="Manrope, sans-serif" font-size="22" font-weight="820" text-anchor="end" dy="0">F4.2</text>
