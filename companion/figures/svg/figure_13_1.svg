<title id="title">F13.1: The Inspectable AI Evaluation System</title>
<desc id="desc">Four phases connect discovery, collection, interpretation, and earned trust through an inspectable evidence path.</desc>
<rect data-figure-background="true" width="100%" height="100%" fill="#FFFFFF" />
<rect width="1600" height="2300" fill="#FAFAFA"/>
