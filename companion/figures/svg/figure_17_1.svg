<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2300" viewBox="0 0 1600 2300" role="img" aria-labelledby="title desc">
<title id="title">F17.1: The Evidence Operations Chain</title>
<desc id="desc">Each artifact inherits a decision thread and leaves a visible update for the next one. The stages are: Observation; Company context and classification; Analytics, flag, and feasibility audit; Hypothesis and decision record; PRD and prototype; Implementation and review evidence; Discovery backlog and new evidence; Proceed, revise, narrow, pivot, stop, or investigate; Update source artifacts and the next slice.</desc>
