<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1150" viewBox="0 0 1800 1150" role="img" aria-labelledby="title desc">
<title id="title">F4.1: The Image Asset Journey</title>
<desc id="desc">The application authorises the action; specialised systems move and transform the file. The stages are: User selects an image; Client validates format, size, and dimensions; Application authorises a short-lived upload; Client uploads directly to object storage; Object event starts scanning and transformation; Worker generates variants and metadata; Application exposes ready state and URLs; Client requests the appropriate CDN variant; CDN serves cache or fetches the origin.</desc>
