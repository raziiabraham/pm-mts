<svg xmlns="http://www.w3.org/2000/svg" width="3000" height="2200" viewBox="0 0 3000 2200" role="img" aria-labelledby="title desc">
<title id="title">F20.1: Building Is Not Shipping</title>
<desc id="desc">A coral route connects an evidence-backed brief through implementation, checks, human review, rollout, production behavior, and learning.</desc>
<rect data-figure-background="true" width="100%" height="100%" fill="#FFFFFF" />
<rect width="3000" height="2200" fill="#FAFAFA"/>
<text x="150" y="125" fill="#242424" font-family="Newsreader, sans-serif" font-size="70" font-weight="620" text-anchor="start" dy="0">BUILDING IS NOT SHIPPING</text>
<text x="154" y="225" fill="#6D6D6D" font-family="Manrope, sans-serif" font-size="27" font-weight="520" text-anchor="start" dy="0">A change becomes a product only after it survives verification, review, controlled exposure, and learning.</text>
<rect x="150" y="345" width="190" height="14" rx="7" fill="#404040" stroke="none" stroke-width="1"/>
<rect x="120" y="440" width="1290" height="1480" rx="42" fill="#E2E2E2" stroke="none" stroke-width="1"/>
<rect x="1590" y="440" width="1290" height="1480" rx="42" fill="#D6D6D6" stroke="none" stroke-width="1"/>
<text x="370" y="545" fill="#666666" font-family="Newsreader, sans-serif" font-size="70" font-weight="620" text-anchor="start" dy="0">BUILD</text>
<text x="1680" y="545" fill="#242424" font-family="Newsreader, sans-serif" font-size="70" font-weight="620" text-anchor="start" dy="0">SHIP</text>
<text x="370" y="620" fill="#6D6D6D" font-family="Manrope, sans-serif" font-size="25" font-weight="600" text-anchor="start" dy="0">Produce a bounded change and earn confidence in it.</text>
<text x="1680" y="620" fill="#6D6D6D" font-family="Manrope, sans-serif" font-size="25" font-weight="600" text-anchor="start" dy="0">Expose deliberately, observe reality, and keep learning.</text>
