<title id="title">F6.1: From Product Reality to a Decision</title>
<desc id="desc">Analytics is a governed interpretation layer, not an independent dashboard. The stages are: Stored state, events, identity, time, and exposure; Versioned semantic definitions; Journey, funnel, cohort, retention, adoption, and monetisation views; Product decision.</desc>
