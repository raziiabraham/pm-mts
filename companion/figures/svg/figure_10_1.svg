<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2300" viewBox="0 0 1600 2300" role="img" aria-labelledby="title desc">
<title id="title">F10.1: The Behavioral Diagnosis Loop</title>
<desc id="desc">Models produce competing explanations; evidence earns the intervention. The stages are: Define one observable target behavior; Locate the journey step; Compare Fogg and COM-B diagnoses; Name competing hypotheses; Gather behavioral, qualitative, and system evidence; Choose the most credible and ethical intervention; Measure behavior and harms.</desc>
